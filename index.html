<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0e1018;

  .ui{position:fixed;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.45);pointer-events:none}

  #retry{margin-top:22px;background:#e8362e;color:#fff;border:0;border-radius:40px;
    font-size:22px;font-weight:800;padding:16px 54px;cursor:pointer;box-shadow:0 8px 24px rgba(232,54,46,.4)}
  #hp{top:52px;left:18px;font-size:17px;letter-spacing:1px}
  #vig{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;
    background:radial-gradient(ellipse at center, rgba(200,20,20,0) 42%, rgba(190,15,15,.7) 100%)}
  #flash{position:fixed;inset:0;pointer-events:none;z-index:38;background:#fff;opacity:0}
  #banner{position:fixed;top:28%;left:0;right:0;text-align:center;color:#fff;font-size:32px;font-weight:900;

  #gapwrap{position:fixed;top:96px;left:50%;transform:translateX(-50%);width:220px;height:12px;

  #gapbar{height:100%;width:100%;background:linear-gradient(90deg,#ffd84a,#e8a01a);border-radius:8px}
  @keyframes bpop{0%{transform:scale(.7)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  /* ===== ゲーム風HUD ===== */

    padding:calc(10px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 10px calc(14px + env(safe-area-inset-left));

  #combo{position:fixed;top:102px;left:50%;transform:translateX(-50%);z-index:35;pointer-events:none;
    font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6);text-align:center;opacity:0;transition:opacity .18s}

  .mbtn:active{transform:scale(.96)}
  .ov{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;

  .ov.show{display:flex}
  .card{background:#14182a;border:2px solid #2a3050;border-radius:20px;width:min(440px,95vw);max-height:88vh;
    overflow-y:auto;padding:18px;box-sizing:border-box;box-shadow:0 18px 50px rgba(0,0,0,.55);color:#eef;text-align:left}
  .card h2{margin:0 0 4px;font-size:25px;font-weight:900;text-align:center;color:#fff}
  .bal{text-align:center;font-weight:900;color:#ffd84a;font-size:17px;margin:4px 0 12px}
  .tabs{display:flex;gap:8px;margin-bottom:12px}

  .row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:#1b2138;margin-bottom:8px}
  .row .ic{font-size:23px;width:32px;text-align:center;flex:0 0 auto}
  .row .info{flex:1;min-width:0}
  .row .nm{font-weight:800;font-size:15px}
  .row .ds{font-size:12px;color:#9fb0d8}
  .row .lv{font-size:11px;color:#7fd0ff;font-weight:800;margin-top:2px}
  .row button{background:#ffd84a;color:#222;border:0;border-radius:20px;font-weight:900;padding:9px 13px;font-size:13px;cursor:pointer;white-space:nowrap;flex:0 0 auto}
  .row button:disabled{background:#39405e;color:#7b85a6;opacity:1;cursor:default}
  .row button.owned{background:#2a8a4a;color:#fff}
  .row button.eq{background:#4f74d0;color:#fff}
  .barwrap{height:6px;background:#0d1124;border-radius:4px;overflow:hidden;margin-top:5px}
  .barwrap i{display:block;height:100%;background:linear-gradient(90deg,#4fd0ff,#1f7fe0)}
  .closebtn{margin-top:14px;width:100%;background:#e8362e;color:#fff;border:0;border-radius:24px;font-weight:900;font-size:17px;padding:13px;cursor:pointer}
  .dailyrw{font-size:46px;margin:6px}
  #pausebtn{position:fixed;top:calc(102px + env(safe-area-inset-top));right:calc(14px + env(safe-area-inset-right));z-index:34;font-size:17px;cursor:pointer;pointer-events:auto;color:#fff;
    background:rgba(0,0,0,.32);border-radius:50%;width:38px;height:38px;display:none;align-items:center;justify-content:center}
  #reviveBtn{margin-top:10px;background:#ffd84a;color:#222;border:0;border-radius:40px;font-size:20px;font-weight:900;padding:14px 40px;cursor:pointer;box-shadow:0 8px 22px rgba(255,216,74,.4)}
  .setrow{display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:12px;background:#1b2138;margin-bottom:8px;font-weight:800}
  .toggle{width:52px;height:28px;border-radius:16px;background:#39405e;position:relative;cursor:pointer;transition:background .2s}
  .toggle.on{background:#2a8a4a}
  .toggle i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s}
  .toggle.on i{left:27px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="loader"><div class="lspin"></div><div class="ltxt">Nagoya<b>NINGEN</b>RUN</div><div class="lsub">読み込み中…</div></div>
<div id="hud">
  <div id="avatar"><img src="ui/hero_head.png" alt="ナゴヤ人間"><div id="hp">❤️❤️❤️</div></div>
  <div id="scorebox">スコア<b id="sc">0</b><span id="dist"></span></div>
  <div id="prog"><span class="se">S</span><div id="progbar"><div id="progfill"></div><img id="progrun" src="ui/hero_full.png"></div><span class="se">G</span><div id="timer">0:00</div></div>
  <div id="cans">🥤<b id="cn">0</b></div>
</div>
<div id="bgm" class="ui" style="top:calc(60px + env(safe-area-inset-top));right:calc(14px + env(safe-area-inset-right));font-size:24px;pointer-events:auto;cursor:pointer" title="BGM ON/OFF">🔊</div>
<div id="hint" class="ui">← → 長押し／画面の左右を長押し＝移動 ・ ↑ 上スワイプ＝ジャンプ ・ ↓ 下スワイプ＝スライド ・ Shift／ダブルタップ＝ダッシュ</div>
<div id="gapwrap" class="ui"><div id="gapbar"></div></div>
<div id="vig"></div>
<div id="flash"></div>
<div id="fx"></div>
<div id="combo"><b id="combomult">x1</b><span id="combocnt">コンボ</span></div>
<div id="banner"></div>
<div id="pausebtn" title="Pause">⏸</div>
<div id="over"><h1>ゲームオーバー</h1><p id="ovs"></p><button id="reviveBtn">復活</button><button id="retry">リトライ</button></div>
<div id="menu" class="ov"><div class="card" id="menucard"></div></div>
<div id="daily" class="ov"><div class="card" id="dailycard"></div></div>
<div id="pause" class="ov"><div class="card" id="pausecard"></div></div>
<div id="start"><div id="startinner">
  <div id="logo"><span class="ln1">Nagoya</span><span class="ln2">NINGEN</span><span class="ln3">RUN</span></div>
  <div id="logo3d">3D</div>
  <div id="tagline">名古屋の街を駆け抜けろ！</div>
  <button id="startbtn">▶ スタート</button>
  <div id="startctrl">
    <span>移動：← → ／ 画面の左右を長押し　・　ジャンプ：↑ ／ 上スワイプ</span>
    <span>スライド：↓ ／ 下スワイプ　・　ダッシュ：Shift ／ ダブルタップ</span>
  </div>
  <div id="starttip">🥤 コインを集めて避けて走れ ／ ステージごとに巨大ボスが追ってくる</div>
  <div id="startbest"></div>
  <div class="menubtns"><button class="mbtn" id="toShop">🛒 ショップ</button><button class="mbtn" id="toMiss">🎯 ミッション</button></div>
</div></div>
<script src="libs/three.min.js"></script>
<script src="libs/GLTFLoader.js"></script>
<script>
'use strict';
(()=>{ try{
const W=()=>innerWidth, H=()=>innerHeight;
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=0.98;

const scene=new THREE.Scene();
scene.background=new THREE.Color('#8fcdf0');   // 明るい青空（カートゥーン）
scene.fog=new THREE.Fog('#d4ecf7', 160, 440);  // 薄く遠く

const camera=new THREE.PerspectiveCamera(48, W()/H(), 0.1, 600);
const CAM_BASE=new THREE.Vector3(0.0,3.0,8.0);   // ペプシマン：中央背後・低め・道路を真っ直ぐ見る
camera.position.copy(CAM_BASE);

// ===== ライト =====
scene.add(new THREE.HemisphereLight('#dff1ff','#9a8f74',0.6));
const sun=new THREE.DirectionalLight('#fff3df',1.55);
sun.position.set(-13,21,9); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
Object.assign(sun.shadow.camera,{near:1,far:80,left:-22,right:22,top:24,bottom:-16});
sun.shadow.bias=-0.0004; sun.shadow.radius=5; scene.add(sun);
const fill=new THREE.DirectionalLight('#ffe7c8',0.42); fill.position.set(10,8,-6); scene.add(fill);

// ===== 道路（カーブ・勾配する分割メッシュ：頂点を毎フレーム変位）=====
const ROADW=7, FARZ=-220, NEARZ=14;
const roadTex=new THREE.TextureLoader().load('ui/road.jpg');
roadTex.wrapS=roadTex.wrapT=THREE.RepeatWrapping; roadTex.repeat.set(2,260); roadTex.anisotropy=8; roadTex.encoding=THREE.sRGBEncoding;
const ROAD_TILE=1000/260;   // 1リピートのワールド長
const groundStrips=[];
function makeStrip(w, mat, y, xoff){
  const g=new THREE.PlaneGeometry(w,1000,1,160); g.rotateX(-Math.PI/2);   // XZ平面・長さ方向160分割
  const m=new THREE.Mesh(g,mat); m.position.set(xoff||0,y,-400); m.receiveShadow=true; scene.add(m);
  const pos=g.attributes.position, n=pos.count, ox=new Float32Array(n), oz=new Float32Array(n);
  for(let i=0;i<n;i++){ ox[i]=pos.getX(i); oz[i]=pos.getZ(i); }
  groundStrips.push({geo:g,mesh:m,ox,oz}); return m;
}
makeStrip(ROADW, new THREE.MeshStandardMaterial({map:roadTex,color:'#b3b0a8',roughness:0.9}), 0, 0);             // 道路
const curbMat=new THREE.MeshStandardMaterial({color:'#cfc9bd',roughness:1});
[-1,1].forEach(s=> makeStrip(7, curbMat, 0.04, s*(ROADW/2+3.5)) );                                                // 歩道
const lineMat=new THREE.MeshStandardMaterial({color:'#eef0ec',roughness:0.55,emissive:'#39392f',emissiveIntensity:0.12});
[-1,1].forEach(s=> makeStrip(0.16, lineMat, 0.05, s*(ROADW/2-0.55)) );                                            // 路肩の実線
// 道路・歩道・路肩線をカーブ/勾配へ追従（頂点変位）
function updateStrips(){ for(const s of groundStrips){ const pos=s.geo.attributes.position, zoff=s.mesh.position.z;
  for(let i=0;i<pos.count;i++){ const wz=s.oz[i]+zoff; pos.setX(i, s.ox[i]+curveOffsetX(wz)); pos.setY(i, groundY(wz)); }
  pos.needsUpdate=true; } }
const dashMat=lineMat;
const dashes=[]; for(let i=0;i<60;i++){const d=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.04,2.4),dashMat);   // 中央の破線（スクロール＋カーブ）
  d.position.set(0,0.05,-i*5); d.userData={baseX:0,baseY:0.05}; scene.add(d); dashes.push(d);}

// ===== カートゥーンの街並み（明るい店舗ビル）=====
const buildings=[];
const cartCols=['#ecd9a8','#e6ab7c','#dd8f6c','#cf6258','#82b0a0','#6e9cc6','#e8bb5e','#dcb6cc','#8fbc70','#e7d09c','#e9947e','#7ba6cf'];
const trimCols=['#bd9d6a','#a86c4c','#b06848','#9a4038','#5e8676','#4e74a0','#b88c3a','#a87a96','#5e8a44','#bd9a58','#b05a44','#4f78a8'];
const winMat=new THREE.MeshStandardMaterial({color:'#bfe6f4',roughness:0.25,metalness:0.1,emissive:'#3a5e6a',emissiveIntensity:0.14});
const doorMat=new THREE.MeshStandardMaterial({color:'#6b5440',roughness:0.7});
// 日よけのストライプ
function awnTexOf(c){ const cv=document.createElement('canvas');cv.width=64;cv.height=8;const x=cv.getContext('2d');
  for(let i=0;i<8;i++){x.fillStyle=i%2?'#f3eee0':c; x.fillRect(i*8,0,8,8);} const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.encoding=THREE.sRGBEncoding; return t; }

function makeLandmark(cfg, side){
  const MD=MODELS[cfg.f]; if(!MD) return null;
  const m=MD.scene.clone(true); m.scale.setScalar(cfg.h/MD.h0);
  m.rotation.y = side<0?-Math.PI/2:Math.PI/2; m.updateMatrixWorld(true);
  const b=new THREE.Box3().setFromObject(m);

  m.position.y = -b.min.y; m.position.z = -(b.min.z+b.max.z)/2;

  const slots=Math.floor(BLEN/BGAP);
  // 名所を置くスロット（建物の代わり・左右交互に散らす）
  const lmAt={};
  if(LM_CART.every(c=>MODELS[c.f])){
    for(let k=0;k<LM_CART.length;k++){ const slot=2+Math.floor(k*(slots-3)/LM_CART.length); const side=(k%2===0)?-1:1; lmAt[slot+'|'+side]=k; }
  }
  for(let i=0;i<slots;i++){const z=-i*BGAP;
    [-1,1].forEach(side=>{
      const li=lmAt[i+'|'+side];
      if(li!==undefined){ // 名所スロット：この側のビルは置かず名所を立てる
        const g=makeLandmark(LM_CART[li], side);

const LM_INNER_GAP=1.5; // 道路側の端を原点からさらに外側へ逃がすマージン
function loadLandmark(cfg, group, side){
  new THREE.GLTFLoader().load('landmarks/opt/'+cfg.file+'.glb',(gl)=>{
    const m=gl.scene;
    let b=new THREE.Box3().setFromObject(m); const sz=new THREE.Vector3(); b.getSize(sz);
    const s=(sz.y>0.001)? cfg.h/sz.y : 1; m.scale.setScalar(s);
    b=new THREE.Box3().setFromObject(m); const c=new THREE.Vector3();
    m.position.z-= (b.min.z+b.max.z)/2;   // 奥行きは中央寄せ
    m.position.y-=b.min.y;                  // 底面を接地
    // 道路側（内側）の端を原点に。左側(side<0)はモデルの右端(max.x)、右側はmodelの左端(min.x)を基準
    if(side<0) m.position.x-=(b.max.x+LM_INNER_GAP);
    else       m.position.x-=(b.min.x-LM_INNER_GAP);
    m.traverse(o=>{ if(o.isMesh){ o.castShadow=false; o.receiveShadow=false; o.frustumCulled=false;
      if(o.material){ o.material.side=THREE.DoubleSide; if(o.material.map)o.material.map.encoding=THREE.sRGBEncoding; } }});
    group.add(m);
  }, undefined, (e)=>console.warn('landmark load fail',cfg.file,e));
}

    m.scale.setScalar(s); m.updateMatrixWorld(true);
    if(footB) m.position.y=-wpY(footB)+0.05;
    m.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.frustumCulled=false;
      if(o.material){ if(o.material.map)o.material.map.encoding=THREE.sRGBEncoding;

    if(ACT['Running'])ACT['Running'].play();

    console.log(key,'loaded:',gltf.animations.map(a=>a.name).join(','));

function tierPool(m){
  if(m<240) return ['cone','box','car','cone','box','trash'];
  if(m<540) return ['cone','box','car','hole','wall','roller','car','trash'];
  if(m<900) return ['cone','box','car','hole','wall','roller','spikes','drone','enemy','trash'];

const WAVES=[
  // ① コーンのジグザグ：左右に振りながら抜ける
  [{k:'cone',x:-1.7,dz:0},{k:'cone',x:1.7,dz:8},{k:'cone',x:-1.7,dz:16},{k:'cone',x:1.7,dz:24}],
  // ② スライド→ジャンプ→スライド の縦リズム
  [{k:'bar',x:0,dz:0},{k:'lowwall',x:0,dz:12},{k:'bar',x:0,dz:24}],
  // ③ 車のスラローム（背が高い＝横に避ける）
  [{k:'car',x:-1.8,dz:0},{k:'car',x:1.8,dz:10},{k:'car',x:-1.8,dz:20}],
  // ④ 連続ジャンプ：箱→穴→箱
  [{k:'box',x:0,dz:0},{k:'hole',x:0.3,dz:11},{k:'box',x:-0.3,dz:21}],

  [{k:'trash',x:0,dz:0},{k:'cone',x:-1.7,dz:10},{k:'cone',x:1.7,dz:17}],
  // ⑥ 幅広の穴→着地後すぐスライド
  [{k:'pit',x:0,dz:0},{k:'bar',x:0,dz:13}],
];
function spawnWave(w){ for(const s of w) spawnObAt(s.k, s.x, SPZ-(s.dz||0)); return Math.max.apply(null,w.map(s=>s.dz||0))+8; }
// パターン1つを生成。手前まで消費した追加距離を返す（次のスポーン間隔に加算）
function spawnPattern(){
  const m=scroll, pool=tierPool(m), r=Math.random();
  if(m>360 && r<0.24){ return spawnWave(WAVES[(Math.random()*WAVES.length)|0]); } // 手作りウェーブ
  if(r<0.30){ spawnObAtX(Math.random()<0.5?'bar':'lowwall', 0); return 0; }        // 全幅：スライド/ジャンプ
  if(r<0.56){ const gapX=randX(), side=Math.random()<0.5?-1:1;                     // 隙間を縫う：左右に避け障害物
    spawnObAtX(pickBlocker(pool), Math.max(-2.4,gapX-side*1.9)); spawnObAtX(pickBlocker(pool), Math.min(2.4,gapX+side*1.9)); return 0; }
  if(r<0.68 && m>560){ spawnObAtX('pit', 0); return 0; }                           // 幅広の穴：全力ジャンプ
  if(r<0.80 && m>300){ spawnObAtX('hole', -2.0+Math.random()*4.0); return 0; }     // 穴：ジャンプ（即死）
  spawnObAtX(pool[(Math.random()*pool.length)|0], randX()); return 0;              // 単発
}

let actx=null;
function sfx(name,rate){ if(!bgmOn)return; try{   // ミュート中(🔇)は効果音も鳴らさない。rate=ピッチ倍率（コンボで上昇）
  if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  const P={ jump:[520,900,0.16,'square',0.16], slide:[320,130,0.22,'sawtooth',0.15], dash:[200,1300,0.22,'sawtooth',0.18],
    coin:[950,1600,0.08,'square',0.14], hit:[180,55,0.26,'square',0.28], crash:[420,40,0.5,'sawtooth',0.3],
    near:[1300,420,0.1,'sine',0.1], up:[600,1250,0.26,'triangle',0.18], chase:[150,150,0.3,'square',0.22], star:[700,1500,0.3,'triangle',0.18] }[name];
  if(!P)return; const r=rate||1, now=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  const[f0,f1,dur,type,vol]=P; o.type=type; o.connect(g); g.connect(actx.destination);
  o.frequency.setValueAtTime(f0*r,now); o.frequency.exponentialRampToValueAtTime(Math.max(20,f1*r),now+dur);
  g.gain.setValueAtTime(vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+dur);
  o.start(now); o.stop(now+dur+0.02);
}catch(e){} }

function frame(now){

  if(slowmo>0){ slowmo-=dt; if(SAVE.fx!==0)dt*=0.4; }                // クラッシュ直後スロー（reduced-motionでは無効）
  t+=dt;

  if(state==='run'){
    // ステージ切替（空・霧・速度・カーブ感が変わる）
    const st=curStage();
    if(st!==lastStage){ lastStage=st; baseSpeed=st.spd; banner(st.n,1700);
      scene.background.set(st.sky); scene.fog.color.set(st.fog); }
    // カーブ・勾配を距離で切替（ステージの強さ上限内で）
    if(scroll>curveNextAt){ curveNextAt=scroll+90+Math.random()*120;
      curveTargetK=(Math.random()<0.32)?0:(Math.random()<0.5?-1:1)*(st.cAmp*0.4+Math.random()*st.cAmp*0.6); }
    curveK+=(curveTargetK-curveK)*(1-Math.exp(-1.2*dt));
    if(rideT>0){ slopeTargetK=-0.14; }                                       // スケボー中は急な下り坂で爆走
    else if(scroll>slopeNextAt){ slopeNextAt=scroll+140+Math.random()*160;
      slopeTargetK=(Math.random()<0.5)?0:(Math.random()<0.5?-1:1)*(st.sAmp*0.5+Math.random()*st.sAmp*0.5); }
    slopeK+=(slopeTargetK-slopeK)*(1-Math.exp(-1.0*dt));

    speed=baseSpeed+(dashT>0?DASH_BOOST:0)+(mode==='chase'?4:0)+(rideT>0?7:0)+downhill;

    if(invertT>0)invertT-=dt;
    if(comboT>0){ comboT-=dt; if(comboT<=0) breakCombo(); }   // コンボ時間切れでリセット

  // S→G 進捗バー＋ランナーマーカー＋タイマー
  if(state==='run') gameTime+=dt;
  if(elProgFill){ const pr=(scroll%STAGE_LEN)/STAGE_LEN; elProgFill.style.width=(pr*100)+'%';
    if(elProgRun) elProgRun.style.left=(pr*100)+'%'; }
  if(elTimer){ const tt=gameTime|0; elTimer.textContent=(tt/60|0)+':'+('0'+(tt%60)).slice(-2); }

  renderer.render(scene,camera);
}
let camShake=0, prevPowerT=0, gameTime=0;
const STAGE_LEN=800;
const elHp=document.getElementById('hp'), elProgFill=document.getElementById('progfill'),
      elProgRun=document.getElementById('progrun'), elTimer=document.getElementById('timer');
addEventListener('resize',()=>{camera.aspect=W()/H();camera.updateProjectionMatrix();renderer.setSize(W(),H());});
requestAnimationFrame(frame);
window.__3D={scene,camera,renderer,get model(){return activeChar&&activeChar.holder}};
window.__game={get state(){return state}, get obstacles(){return obstacles}, get py(){return py},
  get grounded(){return grounded}, get sliding(){return sliding}, get scroll(){return scroll},
  get speed(){return speed}, get powerT(){return powerT}, get chars(){return chars},
  jump:doJump, slide:doSlide, steer(d){setSteer(d);}, dash:doDash, restart:restart,
  get px(){return px;}, get pvx(){return pvx;}, get hp(){return hp;}, get mode(){return mode;},
  startChase(){startChase();}, endChase(){endChase();},
  emerald(){powerT=20;},
  spawnOb(){spawnObstacle();}, spawnPat(){spawnPattern();}, spawnCoins(z){spawnCoins(z==null?SPZ-6:z);}, kill(){gameOver();}, setScroll(v){scroll=v;},
  setFootLift(v){FOOT_LIFT=v;}, get footLift(){return FOOT_LIFT;},
  setCurve(k){curveK=k;curveTargetK=k;}, setSlope(k){slopeK=k;slopeTargetK=k;}, get curveK(){return curveK;},
  get combo(){return combo;}, get mult(){return mult;}, get save(){return SAVE;},
  juiceTest(){ addCombo(6); for(let q=0;q<7;q++)popText('+'+((20*mult)|0),'#ffd84a',W()/2+(Math.random()-0.5)*160,H()/2+(Math.random()-0.5)*100); popText(combo+' コンボ!','#ffd84a',W()/2,H()/2-70,true); confetti(); return {combo,mult}; },
  skate(){startSkate();}, get rideT(){return rideT;}, invert(s){invertT=s==null?5:s;}, get invertT(){return invertT;},
  chase(kind){startChase(kind);}, get pursuerKind(){return pursuerKind;},
  wave(i){spawnWave(WAVES[i==null?0:i]);}, deco(name){const st=STAGES.find(s=>s.n===name)||curStage(); spawnDeco(st); return decos.length;},
  spawnAt(kind,x,z){spawnObAt(kind,x,z==null?SPZ:z);}, get decos(){return decos;},
  previewCurve(){ updateStrips(); obstacles.forEach(curveMove); coins.forEach(curveMove); emeralds.forEach(curveMove);
    dashes.forEach(curveMove); buildings.forEach(b=>{curveMove(b);b.userData.wins.forEach(curveMove);}); props.forEach(curveMove); landmarks.forEach(curveMove);
    renderer.render(scene,camera); },
  get deadT(){return deadT;}, render(){renderer.render(scene,camera);},
  stepChar(n){const ch=activeChar; for(let k=0;k<(n||10);k++){ch.mixer.update(1/30); if(ch.hips&&ch.hipsBind){ch.hips.position.x=ch.hipsBind.x;ch.hips.position.z=ch.hipsBind.z;}}}
};
}catch(e){window.__err=(e&&e.message)+' @@ '+((e&&e.stack)||'').split('\n').slice(1,3).join(' | ');console.error('SETUP ERR',e);} })();
